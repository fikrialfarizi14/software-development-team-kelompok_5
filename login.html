<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LaundryKu</title>
    <style>
        /* CSS Reuse dari Landing Page */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #e9f3ff 0%, #d4e6ff 100%);
            display: flex; align-items: center; justify-content: center; padding: 1.5rem;
        }

        .auth-card {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0, 70, 120, 0.15);
            padding: 2.2rem;
            width: 100%;
            max-width: 400px;
        }

        .card-header { text-align: center; margin-bottom: 2rem; }
        .card-header h2 { color: #1f4f7a; margin-bottom: 0.5rem; }

        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.85rem; margin-bottom: 0.5rem; color: #2c6288; font-weight: 500; }
        .form-group input {
            width: 100%; padding: 0.8rem 1rem;
            border: 1.5px solid #e2edf7; border-radius: 12px;
            outline: none; transition: 0.2s;
        }
        .form-group input:focus { border-color: #5f9cd1; box-shadow: 0 0 0 3px rgba(95, 156, 209, 0.1); }

        .btn-primary {
            width: 100%; background: #5f9cd1; color: white;
            border: none; padding: 0.9rem; border-radius: 12px;
            font-weight: 600; cursor: pointer; margin-top: 1rem;
        }

        .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: #6c8db0; }
        .auth-footer a { color: #2f6e9e; text-decoration: none; font-weight: 600; }

        .back-home { display: block; text-align: center; margin-top: 1rem; font-size: 0.8rem; color: #aaa; text-decoration: none; }
    </style>
</head>
<body>

<div class="auth-card" id="loginBox">
    <div class="card-header">
        <h2>Selamat Datang</h2>
        <p>Masuk untuk mulai mencuci</p>
    </div>
    <form onsubmit="event.preventDefault(); alert('Login Berhasil (Demo)')">
        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="email@anda.com" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary">Masuk</button>
    </form>
    <div class="auth-footer">
        Belum punya akun? <a href="#" onclick="toggleAuth()">Daftar</a>
    </div>
    <a href="homepage.html" class="back-home">← Kembali ke Beranda</a>
</div>

<div class="auth-card" id="registerBox" style="display: none;">
    <div class="card-header">
        <h2>Buat Akun</h2>
        <p>Gabung bersama LaundryKu</p>
    </div>
    <form onsubmit="event.preventDefault(); alert('Pendaftaran Berhasil (Demo)')">
        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" placeholder="Nama Anda" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="email@anda.com" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Buat password" required>
        </div>
        <button type="submit" class="btn-primary">Daftar</button>
    </form>
    <div class="auth-footer">
        Sudah punya akun? <a href="#" onclick="toggleAuth()">Login</a>
    </div>
</div>

<script>
    function toggleAuth() {
        const loginBox = document.getElementById('loginBox');
        const registerBox = document.getElementById('registerBox');

        if (loginBox.style.display === 'none') {
            loginBox.style.display = 'block';
            registerBox.style.display = 'none';
        } else {
            loginBox.style.display = 'none';
            registerBox.style.display = 'block';
        }
    }
</script>

</body>
</html>
