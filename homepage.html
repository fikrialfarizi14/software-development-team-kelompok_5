<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaundryKu - Solusi Laundry Praktis</title>
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #e9f3ff 0%, #d4e6ff 100%);
            display: flex; align-items: center; justify-content: center;
            padding: 1.5rem;
        }

        .landing-card {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0, 70, 120, 0.15);
            padding: 2.5rem;
            max-width: 800px;
            width: 100%;
        }

        .hero-section { text-align: center; margin-bottom: 2rem; }
        .brand-icon-large { font-size: 3.5rem; margin-bottom: 0.75rem; }
        .hero-section h1 { font-size: 2.5rem; color: #1f4f7a; margin-bottom: 1rem; }
        .tagline { color: #5a7d9e; line-height: 1.6; margin-bottom: 1.5rem; }

        .info-box {
            background: #f0f7fe;
            border-radius: 20px;
            padding: 1.2rem;
            margin-bottom: 2rem;
            border-left: 4px solid #5f9cd1;
            text-align: center;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .service-item {
            background: #f8fbfe;
            padding: 1.5rem 1rem;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #e2edf7;
            transition: 0.3s;
        }

        .service-item:hover { transform: translateY(-5px); border-color: #7bb3d9; }
        .service-icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .service-price { font-weight: 700; color: #4682b4; margin-top: 0.5rem; }

        .btn-login {
            display: inline-block;
            background: #5f9cd1;
            color: white;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(95, 156, 209, 0.4);
        }

        .btn-login:hover { background: #4682b4; transform: scale(1.05); }

        @media (max-width: 600px) {
            .hero-section h1 { font-size: 1.8rem; }
            .services-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="landing-card">
    <div class="hero-section">
        <div class="brand-icon-large">🧺✨</div>
        <h1>LaundryKu</h1>
        <p class="tagline">Solusi cuci praktis, cepat, dan berkualitas untuk keseharian Anda.</p>
    </div>

    <div class="info-box">
        <p><strong>Layanan Profesional</strong> — Tersedia antar-jemput gratis radius 2km!</p>
    </div>

    <div class="services-grid">
        <div class="service-item">
            <div class="service-icon">👕</div>
            <h3>Cuci Kering</h3>
            <p class="service-price">Rp 7k/kg</p>
        </div>
        <div class="service-item">
            <div class="service-icon">👔</div>
            <h3>Cuci Setrika</h3>
            <p class="service-price">Rp 10k/kg</p>
        </div>
        <div class="service-item">
            <div class="service-icon">🧥</div>
            <h3>Setrika Saja</h3>
            <p class="service-price">Rp 5k/kg</p>
        </div>
        <div class="service-item">
            <div class="service-icon">⚡</div>
            <h3>Express</h3>
            <p class="service-price">Rp 15k/kg</p>
        </div>
    </div>

    <div style="text-align: center;">
        <a href="login.html" class="btn-login">Pesan Sekarang</a>
    </div>
</div>

</body>
</html>
